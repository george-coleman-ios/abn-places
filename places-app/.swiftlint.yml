
disabled_rules:
  - line_length
  - identifier_name
  - missing_docs
  - large_tuple
  - trailing_whitespace
  - comment_spacing
  - type_name
  - function_parameter_count
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - overridden_super_call
  - force_unwrapping
  - redundant_nil_coalescing
  - accessibility_label_for_image
  - accessibility_trait_for_button

file_length:
  warning: 800
  error: 9999

type_body_length:
  warning: 250
  error: 9999

nesting:
  type_level:
    warning: 5

function_body_length:
  warning: 50

cyclomatic_complexity:
  warning: 15

vertical_whitespace:
  max_empty_lines: 2 # If we allow empty lines within method bodies to improve readability, it makes sense to also allow double empty lines between methods themselves.

switch_case_alignment:
  indented_cases: true

warning_threshold: 1

reporter: "xcode"
